# Unique project identifier (must match the key in SonarQube UI)
sonar.projectKey=SecOpsToDo_Final
sonar.projectName=SecOpsToDo
sonar.projectVersion=1.0

# Encoding
sonar.sourceEncoding=UTF-8

# Source directories to scan
sonar.sources=frontend/src,backend

# Exclude unnecessary / noisy files (reports, vendor, build artifacts)
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/*.css,**/*.map,**/*.html,**/*.json,**/*.xml

# Optional: test sources (only add if these folders exist)
# sonar.tests=frontend/tests,backend/test
# sonar.test.inclusions=**/*.test.js,**/*.spec.js
